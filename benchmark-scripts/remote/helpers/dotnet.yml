name: Dotnet related scripts
scripts:
  ensure-dotnet:
    - sh: echo "${{config.dotnet.home:}}"
      then:
        - regex: ^$
          then:
            # No local dotnet path provided — install via mise.
            # The version string follows mise syntax (e.g. "10.0.100", "9.0.100").
            - script: mise-ensure-runtime
              with:
                tool: dotnet
                version: ${{config.dotnet.version}}
                install_if_missing: true
            - sh: export DOTNET_ROOT=${{MISE_TOOL_HOME}}
            - sh: export PATH=$DOTNET_ROOT:$PATH
          else:
            - log: Using locally installed dotnet from ${{config.dotnet.home}}
            - sh: export DOTNET_ROOT=${{config.dotnet.home}}
            - sh: export PATH=$DOTNET_ROOT:$PATH
            - sh: test -x "$DOTNET_ROOT/dotnet"
              then:
                - regex: ".*"
                  else:
                    - abort: dotnet executable not found at ${{config.dotnet.home}}/dotnet
    - log: Showing dotnet version
    - sh: dotnet --version
