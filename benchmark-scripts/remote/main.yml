name: quarkus-dotnet-benchmarks
states:
  env.run.host.user: someuser
  env.run.host.name: 127.0.0.1
  env.run.host.target: ${{env.run.host.user}}@${{env.run.host.name}}

  # Units
  config.units.timings.build: sec
  config.units.timings.startup: ms
  config.units.rss.startup: MiB
  config.units.rss.firstRequest: MiB
  config.units.rss.load: MiB
  config.units.load.throughput: tps
  config.units.load.throughputDensity: tps per MiB
  config.units.load.errors.connectionErrors: absolute number
  config.units.load.errors.requestTimeouts: absolute number

  # Runtime version strings must be in mise syntax (see mise.yml).
  # Examples:
  #   java@21                           # latest 21.x via mise default backend
  #   java@temurin-21.0.5+11
  #   java@graalvm-community-25.0.2
  #   java@mandrel-24.1.2.0-Final
  #   dotnet@10.0.100
  config.jvm.home: #/path/to/java
  config.jvm.version: temurin-25.0.2
  config.jvm.graalvm.home: #/path/to/graalvm
  config.jvm.graalvm.version: graalvm-community-25.0.2
  config.jvm.mandrel.home: #/path/to/mandrel
  config.jvm.mandrel.version: #mandrel-24.1.2.0-Final
  config.dotnet.home: #/path/to/dotnet
  config.dotnet.version: 10.0.100
  config.dotnet.gcHeapHardLimit: #DOTNET_GCHeapHardLimit value (bytes), e.g. 134217728 for 128MB

  config.quarkus.version: #3.28.3

  config.jvm.memory: #-Xmx128m
  config.jvm.args: #-XX:+UseNUMA
  config.quarkus.build_config_args:

  config.quarkus.native_build_options: #-Dquarkus.native.native-image-xmx=<maximum_memory>

  config.run.dropOsFilesystemCaches: false
  config.run.useContainerHostNetwork: false

  config.resources.cpu.app: 0-3
  config.resources.cpu.db: 4-6
  config.resources.cpu.load_generator: 7-9
  config.resources.cpu.1st_request: 10
  config.resources.cpu.monitor: 11
  config.resources.cpu.otel: 12-14
  config.resources.app_cpus: 4   # core count for DOTNET_ProcessorCount; should match cpu.app range size

  config.profiler.name: none #jfr syncjfr flamegraph
  config.profiler.events: cpu

  # Directory on the remote where rsync deploys this repository's contents.
  # Resolved relative to the user's home dir in update-state.
  config.deployment.dir: quarkus-dotnet-benchmarks

  config.num_iterations: 3

  APP_CMD_PREFIX: taskset --cpu-list ${{config.resources.cpu.app}}
  LOAD_GEN_CMD_PREFIX: taskset --cpu-list ${{config.resources.cpu.load_generator}}
  MONITOR_CMD_PREFIX: taskset --cpu-list ${{config.resources.cpu.monitor}}
  RUN.WRK_BIN: ${{LOAD_GEN_CMD_PREFIX}} jbang -R -XX:+UseNUMA wrk@hyperfoil

  PAUSE_TIME: 5
  PROFILER_JVM_ARGS:
  BASE_JAVA_CMD: ${{APP_CMD_PREFIX}} java ${{config.jvm.memory}} ${{config.jvm.args}} ${{PROFILER_JVM_ARGS}}
  TESTS : [measure-time-to-first-request, measure-rss, run-load-test]
  RUNTIMES: [quarkus-jvm, quarkus-virtual, quarkus-native, quarkus-native-mandrel, dotnet-aspnet-ef]
  TARGET_URL: http://localhost:8080/fruits
  QUARKUS-PLATFORM-ARTIFACT-ID: quarkus-bom
  METRICS_DIR: /tmp
  ASYNC_PROFILER: async-profiler
  RUNTIMECMDS:
    - name: quarkus-jvm
      type: jvm
      dir: ${{QUARKUS_JVM_DIR}}
      updateScript: skip-version-update
      buildRequiresTestServices: false
      buildCmd: "${{APP_CMD_PREFIX}} ./mvnw ${{config.quarkus.build_config_args}} clean package -DskipTests"
      runCmd: "${{BASE_JAVA_CMD}} -jar ${{RUNTIME_BUILD_DIR}}/quarkus-app/quarkus-run.jar"
      logFileStartedRegex: ".*quarkus3.+started in.*"
    - name: quarkus-leyden
      type: jvm
      dir: ${{QUARKUS_JVM_DIR}}
      updateScript: skip-version-update
      buildRequiresTestServices: false
      buildCmd: "${{APP_CMD_PREFIX}} ./mvnw ${{config.quarkus.build_config_args}} clean verify -Dquarkus.package.jar.aot.enabled=true -Dsurefire.excludes='**/*'"
      runCmd: "${{BASE_JAVA_CMD}} -XX:AOTCache=${{RUNTIME_BUILD_DIR}}/quarkus-app/app.aot -jar ${{RUNTIME_BUILD_DIR}}/quarkus-app/quarkus-run.jar"
      logFileStartedRegex: ".*quarkus3.+started in.*"
    - name: quarkus-virtual
      type: jvm
      dir: ${{QUARKUS_VIRTUAL_DIR}}
      updateScript: skip-version-update
      buildRequiresTestServices: false
      buildCmd: "${{APP_CMD_PREFIX}} ./mvnw ${{config.quarkus.build_config_args}} clean package -DskipTests"
      runCmd: "${{BASE_JAVA_CMD}} -jar ${{RUNTIME_BUILD_DIR}}/quarkus-app/quarkus-run.jar"
      logFileStartedRegex: ".*quarkus3.+started in.*"
    - name: quarkus-virtual-leyden
      type: jvm
      dir: ${{QUARKUS_VIRTUAL_DIR}}
      updateScript: skip-version-update
      buildRequiresTestServices: false
      buildCmd: "${{APP_CMD_PREFIX}} ./mvnw ${{config.quarkus.build_config_args}} clean verify -Dquarkus.package.jar.aot.enabled=true -Dsurefire.excludes='**/*'"
      runCmd: "${{BASE_JAVA_CMD}} -XX:AOTCache=${{RUNTIME_BUILD_DIR}}/quarkus-app/app.aot -jar ${{RUNTIME_BUILD_DIR}}/quarkus-app/quarkus-run.jar"
      logFileStartedRegex: ".*quarkus3.+started in.*"
    - name: quarkus-native
      type: native
      nativeTool: graalvm
      dir: ${{QUARKUS_JVM_DIR}}
      updateScript: skip-version-update
      buildRequiresTestServices: false
      buildCmd: "${{APP_CMD_PREFIX}} ./mvnw ${{config.quarkus.build_config_args}} clean package -DskipTests -Pnative ${{config.quarkus.native_build_options}}"
      runCmd: "${{APP_CMD_PREFIX}} ${{RUNTIME_BUILD_DIR}}/quarkus3-runner ${{config.jvm.memory}}"
      logFileStartedRegex: ".*quarkus3.+started in.*"
    - name: quarkus-native-mandrel
      type: native
      nativeTool: mandrel
      dir: ${{QUARKUS_JVM_DIR}}
      updateScript: skip-version-update
      buildRequiresTestServices: false
      buildCmd: "${{APP_CMD_PREFIX}} ./mvnw ${{config.quarkus.build_config_args}} clean package -DskipTests -Pnative ${{config.quarkus.native_build_options}}"
      runCmd: "${{APP_CMD_PREFIX}} ${{RUNTIME_BUILD_DIR}}/quarkus3-runner ${{config.jvm.memory}}"
      logFileStartedRegex: ".*quarkus3.+started in.*"
    - name: dotnet-aspnet-ef
      type: dotnet
      dir: ${{DOTNET_DIR}}
      updateScript: skip-version-update
      buildCmd: "dotnet publish Dotnet10 -c Release -o publish"
      runCmd: "env DOTNET_GCHeapHardLimit=${{config.dotnet.gcHeapHardLimit}} DOTNET_ProcessorCount=${{config.resources.app_cpus}} DOTNET_gcServer=1 ${{APP_CMD_PREFIX}} ./publish/dotnet10"
      logFileStartedRegex: ".*dotnet10.+started in.*"

scripts:
  # Computes paths to apps and scripts on the remote target.
  # The remote layout mirrors the repository: rsync deploys the working tree
  # under ${HOME}/${config.deployment.dir}, so PROJ_REPO_DIR points at that
  # rsync target. There is no git clone on the remote.
  update-state:
    - sh: echo $(realpath ~)
    - set-state: RUN.BASE_DIR
    - set-state: RUN.PROJ_REPO_DIR ${{BASE_DIR}}/${{config.deployment.dir}}
    - set-state: RUN.SCRIPTS_DIR ${{PROJ_REPO_DIR}}/benchmark-scripts/remote
    - set-state: RUN.HELPER_SCRIPTS_DIR ${{SCRIPTS_DIR}}/scripts
    - set-state: RUN.LOCAL_SCRIPTS_DIR ${{PROJ_REPO_DIR}}/benchmark-scripts/local
    - set-state: RUN.QUARKUS_JVM_DIR ${{PROJ_REPO_DIR}}/apps/quarkus-jvm
    - set-state: RUN.QUARKUS_VIRTUAL_DIR ${{PROJ_REPO_DIR}}/apps/quarkus-virtual
    - set-state: RUN.DOTNET_DIR ${{PROJ_REPO_DIR}}/apps/dotnet-core-aspnet-ef
    - set-state: RUN.LOGS_DIR ${{PROJ_REPO_DIR}}/logs
    - set-state: RUN.BUILDS_DIR ${{PROJ_REPO_DIR}}/builds
    - set-state: RUN.ASYNC_PROFILER_DIR ${{BASE_DIR}}/${{ASYNC_PROFILER}}

  output-vars:
    - log: |
        "Config: ${{config}}"
        "ENV: ${{env}}"
        "BASE_DIR: ${{BASE_DIR}}"
        "PROJ_REPO_DIR: ${{PROJ_REPO_DIR}}"
        "SCRIPTS_DIR: ${{SCRIPTS_DIR}}"
        "LOCAL_SCRIPTS_DIR: ${{LOCAL_SCRIPTS_DIR}}"
        "QUARKUS_JVM_DIR: ${{QUARKUS_JVM_DIR}}"
        "QUARKUS_VIRTUAL_DIR: ${{QUARKUS_VIRTUAL_DIR}}"
        "DOTNET_DIR: ${{DOTNET_DIR}}"
        "RUNTIMECMDS: ${{RUNTIMECMDS}}"

  # Captures repo metadata for the run record. With rsync deployment there is
  # no .git on the remote, so commit info is read from a RUN_INFO file written
  # by the deploy script. The file is optional — if missing, info stays unset.
  capture-repo-info:
    - sh: |
        if [ -f "${{PROJ_REPO_DIR}}/RUN_INFO" ]; then
          cat "${{PROJ_REPO_DIR}}/RUN_INFO"
        else
          echo "RUN_INFO file not present"
        fi
    - read-state: ${{config.repo.scenario}}
      then:
        - regex: ootb
          then:
            - set-state:
                key: RUN.config.repo.scenarioName
                value: Out of the box
          else:
            - regex: tuned
              then:
                - set-state:
                    key: RUN.config.repo.scenarioName
                    value: Tuned
              else:
                - set-state:
                    key: RUN.config.repo.scenarioName
                    value: ${{config.repo.scenario:}}

  cleanup-ports:
    - log: Cleaning up leftover processes on port 8080 and Java/dotnet processes
    - sh: "lsof -i :8080 -t 2>/dev/null | xargs -r kill -9 || true"
    - sh: "sleep 1"
    - sh: "pkill -f 'java.*quarkus' || true"
    - sh: "pkill -f 'java.*dotnet' || true"
    - sh: "pkill -f '/dotnet' || true"
    - sh: "sleep 1"

  # Resets transient run artifacts. Does NOT remove the rsync'd source tree.
  cleanup-env:
    - script: cleanup-ports
    - sh: rm -Rf ${{LOGS_DIR}} ${{BUILDS_DIR}}

  config-env:
    - sh: rm -Rf ${{LOGS_DIR}}
    - sh: mkdir -p ${{LOGS_DIR}}

  update-runtime-version:
    - log: "Updating version: ${{RUNTIMECMD.updateVersion:}}"
    - script: ${{RUNTIMECMD.updateScript:abort-script-not-found}}
      with:
        DIR: ${{RUNTIMECMD.dir}}
        VERSION: ${{RUNTIMECMD.updateVersion:}}
    # Pre-download dependencies to exclude it from build time and to surface
    # dependency resolution issues before we start measuring build times.
    # Maven-only — dotnet uses NuGet's own restore on first build.
    - sh: cd ${{RUNTIMECMD.dir}}
    - read-state: ${{RUNTIMECMD.type}}
      then:
        - regex: "^(jvm|native)$"
          then:
            - log: "Downloading dependencies for ${{RUNTIMECMD.name}}"
            - sh: ./mvnw dependency:go-offline

  build-and-cache-runtime:
    - script: measure-build-times
      with:
        RUNTIMECMD: ${{RUNTIMECMD}}
    - sh: rm -rf ${{BUILDS_DIR}}/${{RUNTIMECMD.name}}
    - sh: cp -a ${{RUNTIMECMD.dir}}/target ${{BUILDS_DIR}}/${{RUNTIMECMD.name}}

  run-tests-for-runtime:
    - log: "Testing: ${{RUNTIMECMD.name}}"
    - for-each: TEST ${{TESTS}}
      then:
        - script: ${{TEST}}
          with:
            RUNTIME_BUILD_DIR: ${{BUILDS_DIR}}/${{RUNTIMECMD.name}}
            RUNTIMECMD: ${{RUNTIMECMD}}

  start-test-services:
    - sh: "${{LOCAL_SCRIPTS_DIR}}/infra.sh -c 3 -l 3 -p '${{config.resources.cpu.db}}' -g '${{config.resources.cpu.otel}}' -s ${{= ${{config.run.useContainerHostNetwork:false}} ? '-n' : ''}}"
      watch:
        - regex: "Error: PostgreSQL failed to become ready"
          then:
            - abort: PostgreSQL failed to become ready
        - regex: "Error: Otel LGTM failed to become ready"
          then:
            - abort: Otel LGTM failed to become ready

  capture-otel-data:
    - sh: ${{LOCAL_SCRIPTS_DIR}}/lookup_otel_service.sh > ${{LOGS_DIR}}/otel-${{RUNTIMECMD.name}}-${{ITERATION}}.log 2>&1
    - queue-download: ${{LOGS_DIR}}/otel-${{RUNTIMECMD.name}}-${{ITERATION}}.log

  stop-test-services:
    - sh: ${{LOCAL_SCRIPTS_DIR}}/infra.sh -d

  run-tests:
    - sh: java -version
    - sh: echo $$
    - set-state: RUN.SHELL_PID
    - sh: mkdir -p ${{BUILDS_DIR}}

    # Phase 1: Build all runtimes upfront and cache artifacts
    # Separate into 2 phases so we capture any build failures early on
    # and don't proceed with testing runtimes that fail to build
    - for-each: RUNTIME ${{RUNTIMES}}
      then:
        - set-state: RUNTIMECMD ${{RUNTIMECMDS[?(@.name == '${{RUNTIME}}')]}}
        - script: update-runtime-version
          with:
            RUNTIMECMD: ${{RUNTIMECMD}}
        - script: build-and-cache-runtime
          with:
            RUNTIMECMD: ${{RUNTIMECMD}}

    # Phase 2: Run tests for all runtimes using cached builds
    - for-each: RUNTIME ${{RUNTIMES}}
      then:
        - set-state: RUNTIMECMD ${{RUNTIMECMDS[?(@.name == '${{RUNTIME}}')]}}
        - script: run-tests-for-runtime
          with:
            RUNTIMECMD: ${{RUNTIMECMD}}

  abort-script-not-found:
    - abort: script not found

  skip-version-update:
    - log: "Skipping version update (not applicable for ${{RUNTIMECMD.name}})"

  measure-build-times:
    - log: Build times
    - sh: cd ${{RUNTIMECMD.dir}}
    - log: JVM version
    - sh: java -version
    # Switch GRAALVM_HOME to the native image tool appropriate for this runtime
    - read-state: ${{RUNTIMECMD.nativeTool:graalvm}}
      then:
        - regex: mandrel
          then:
            - sh: export GRAALVM_HOME=$MANDREL_HOME
          else:
            - sh: export GRAALVM_HOME=$GRAALVM_HOME
    - log: Native image tool version
    - sh: $GRAALVM_HOME/bin/java -version
    - set-state: TYPE ${{RUNTIMECMD.type}}
    - for-each: ITERATION ${{=[...Array(${{config.num_iterations}}).keys()]}}
      then:
        - queue-download: ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - read-state: ${{RUNTIMECMD.buildRequiresTestServices}}
          then:
            - regex: "true"
              then:
                - script: start-test-services
        - script: sync-drop-fs-cache
        - sh: /usr/bin/time -p sh -c '${{RUNTIMECMD.buildCmd}}' 2>&1 >${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-${{ITERATION}}.log | grep real | awk '{print $2}'
        - set-state: BUILD_TIME
        - sh: cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-${{ITERATION}}.log
          then:
            - regex: "BUILD FAILURE"
              then:
                - abort: Build failed for ${{RUNTIMECMD.name}} iteration ${{ITERATION}}. Check ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-${{ITERATION}}.log for details.
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.build.timings
            value: ${{BUILD_TIME}}
        - read-state: ${{RUNTIMECMD.buildRequiresTestServices}}
          then:
            - regex: "true"
              then:
                - script: stop-test-services

        # If its a native build, gather the native build rss as well
        - read-state: ${{TYPE}}
          then:
            - regex: native
              then:
                - sh: "sed -n 's/.*Peak RSS: \\([0-9.]*\\)\\(GB\\|GiB\\).*/\\1/p' ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-${{ITERATION}}.log"
                  then:
                    - set-state: NATIVE_BUILD_RSS
                - script: state-array-push
                  with:
                    array: RUN.output.results.${{RUNTIMECMD.name}}.build.native.rss
                    value: ${{NATIVE_BUILD_RSS}}
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.build.avBuildTime
        array: RUN.output.results.${{RUNTIMECMD.name}}.build.timings

    - read-state: ${{TYPE}}
      then:
        - regex: native
          then:
            # Capture average native build RSS
            - script: state-array-calc-avg
              with:
                var-name: RUN.output.results.${{RUNTIMECMD.name}}.build.avNativeRSS
                array: RUN.output.results.${{RUNTIMECMD.name}}.build.native.rss

            # The following metrics should be the same in all test iterations, so just pick the 1st
            # Capture the binary size
            - sh: "sed -n 's/^[[:space:]]*\\([0-9.]*\\)\\(MB\\|MiB\\) in total image size.*/\\1/p' ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.native.binarySize

            # Capture the number of classes
            - sh: "cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log | grep \"types.*fields.*methods found reachable\" | awk '{print $1}'"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.classCount

            # Capture the number of fields
            - sh: "cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log | grep \"types.*fields.*methods found reachable\" | awk '{print $3}'"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.fieldCount

            # Capture the number of methods
            - sh: "cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log | grep \"types.*fields.*methods found reachable\" | awk '{print $6}'"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.methodCount

            # Capture the number of classes registered for reflection
            - sh: "cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log | grep \"types.*fields.*methods registered for reflection\" | awk '{print $1}'"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.reflectionClassCount

            # Capture the number of fields registered for reflection
            - sh: "cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log | grep \"types.*fields.*methods registered for reflection\" | awk '{print $3}'"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.reflectionFieldCount

            # Capture the number of methods registered for reflection
            - sh: "cat ${{LOGS_DIR}}/build-times-${{RUNTIMECMD.name}}-0.log | grep \"types.*fields.*methods registered for reflection\" | awk '{print $6}'"
              then:
                - set-state: RUN.output.results.${{RUNTIMECMD.name}}.build.reflectionMethodCount

  measure-time-to-first-request:
    - log: Measuring Time to first request
    - script: cleanup-ports
    - sh: java -version
    - sh: cd ${{RUNTIMECMD.dir}}
    - for-each: ITERATION ${{=[...Array(${{config.num_iterations}}).keys()]}}
      then:
        - queue-download: ${{LOGS_DIR}}/measure-time-to-first-request-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - script: cleanup-ports
        - script: start-test-services
        - script: sync-drop-fs-cache
        - sh: timeout 60s bash -c "taskset --cpu-list ${{config.resources.cpu.1st_request}} ${{HELPER_SCRIPTS_DIR}}/time-to-1st-request.sh '${{RUNTIMECMD.runCmd}}' '${{TARGET_URL}}' '${{LOGS_DIR}}/measure-time-to-first-request-${{RUNTIMECMD.name}}-${{ITERATION}}.log'"
          then:
            - regex: Terminated
              then:
                - abort: Run ${{RUNTIMECMD.runCmd}} didn't start within allotted timeout
            - regex: TTFR=(?<nanoseconds>\\d+) ns
              then:
                - set-state: START_TIME ${{= ${{nanoseconds}} / 1000000 }}
              else:
                - abort: Timeout script returned invalid output
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.startup.timings
            value: ${{START_TIME}}
        - sh: sleep ${{PAUSE_TIME}}
        - script: stop-test-services
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.startup.avStartTime
        array: RUN.output.results.${{RUNTIMECMD.name}}.startup.timings

  measure-rss:
    - log: Measuring RSS
    - script: cleanup-ports
    - sh: java -version
    - sh: cd ${{RUNTIMECMD.dir}}
    - for-each: ITERATION ${{=[...Array(${{config.num_iterations}}).keys()]}}
      then:
        - queue-download: ${{LOGS_DIR}}/measure-rss-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - script: cleanup-ports
        - script: start-test-services
        - script: sync-drop-fs-cache
        - sh: ${{RUNTIMECMD.runCmd}} &>${{LOGS_DIR}}/measure-rss-${{RUNTIMECMD.name}}-${{ITERATION}}.log &
        - sh: APP_PID=$!
        - sh: sleep ${{PAUSE_TIME}}
        - sh: pmap -x $APP_PID | grep total | awk '{print $4}'
          then:
            - set-state: RSS_STARTUP
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.rss.startup
            value: ${{= ${{RSS_STARTUP}}/1024 }}
        - sh: curl -s  ${{TARGET_URL}} > /dev/null
        - sh: pmap -x $APP_PID | grep total | awk '{print $4}'
          then:
            - set-state: FIRST_REQUEST
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.rss.firstRequest
            value: ${{= ${{FIRST_REQUEST}}/1024 }}
        - sh: kill -15 $APP_PID
        - sh: sleep ${{PAUSE_TIME}}
        - script: stop-test-services
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.rss.avStartupRss
        array: RUN.output.results.${{RUNTIMECMD.name}}.rss.startup
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.rss.avFirstRequestRss
        array: RUN.output.results.${{RUNTIMECMD.name}}.rss.firstRequest

  run-load-test:
    - log: Running workload
    - script: cleanup-ports
    - sh: cd ${{RUNTIMECMD.dir}}
    - set-state: RUNTIME_NAME ${{RUNTIMECMD.name}}
    - set-state:
        key: APP_LOG_REGEX
        value: ${{RUNTIMECMD.logFileStartedRegex}}
    - for-each: ITERATION ${{=[...Array(${{config.num_iterations}}).keys()]}}
      then:
        - set-state:
            key: LOG_FILE
            value: ${{LOGS_DIR}}/load-test-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - sh: touch ${{LOG_FILE}}
        - queue-download: ${{LOGS_DIR}}/wrk-warmup-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - queue-download: ${{LOG_FILE}}
        - queue-download: ${{LOGS_DIR}}/wrk-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - script: cleanup-ports
        - script: start-test-services
        - script: sync-drop-fs-cache
        - set-signal: LOAD_STEADY_STATE_START 1
        - set-signal: LOG_REGEX_REACHED 1
        - script:
            # Start watch-log BEFORE the app so tail -f sees output as new lines.
            # If watch-log is started after the app, tail reads the already-written
            # "started" message as existing file content and fires the signal before
            # the app is truly serving traffic (or before wrk has started).
            name: watch-log
            async: true
          with:
            log_file: ${{LOG_FILE}}
            log_regex: ${{APP_LOG_REGEX}}
        - read-state: ${{config.profiler.name}}
          then:
            - regex: "^syncjfr$"
              then:
                - queue-download: ${{LOGS_DIR}}/jfr.${{RUNTIMECMD.name}}-${{ITERATION}}.jfr
                - sh: echo "${{RUNTIMECMD.runCmd}}" | sed 's#-jar#-XX:StartFlightRecording=filename=${{LOGS_DIR}}/jfr.${{RUNTIMECMD.name}}-${{ITERATION}}.jfr,settings=profile,dumponexit=true -jar#'
                  then:
                    - set-state: SYNCJFR_RUN_CMD
                - sh: ${{SYNCJFR_RUN_CMD}} &>${{LOG_FILE}} &
              else:
                - sh: ${{RUNTIMECMD.runCmd}} &>${{LOG_FILE}} &
        - sh: PID=$!
        - sh: echo $PID
        - set-state: JVM_PID
        - script: monitor-processes
          with:
            pid: ${{JVM_PID}}
            log_dir: ${{LOGS_DIR}}
            runtime_name: ${{RUNTIMECMD.name}}
            iteration: ${{ITERATION}}
        - log: JVM_PID = ${{JVM_PID}}
        - read-state: ${{config.profiler.name}}
          then:
            - regex: "^(jfr|flamegraph)$"
              then:
                - script: async-profiler-install
                - script: async-profiler-configure
                - set-state:
                    key: PROFILER_LOGFILE
                    value: "${{RUNTIMECMD.name}}-${{ITERATION}}.${{= '${{config.profiler.name}}' == 'jfr' ? 'jfr' : 'html' }}"
                - script:
                    name: async-profiler-run
                    async: true
                  with:
                    wait_start: LOAD_STEADY_STATE_START
                    pid: ${{JVM_PID}}
                    suffix: ${{PROFILER_LOGFILE}}
                    format: ${{config.profiler.name}}
                    events: ${{config.profiler.events}}
                    delay: 10s
        - wait-for: LOG_REGEX_REACHED
        - sh: ${{RUN.WRK_BIN}} -t 2 -c 100 -d 2m --timeout 2m ${{TARGET_URL}} 2>&1 >${{LOGS_DIR}}/wrk-warmup-${{RUNTIMECMD.name}}-${{ITERATION}}.log
        - regex: unable to connect
          then:
            - abort: unable to connect to target application
        - sleep: 30s # Wait for the app to complete warmup
        - signal: LOAD_STEADY_STATE_START
        - sh: ${{RUN.WRK_BIN}} -t 2 -c 100 -d 30s --timeout 30s ${{TARGET_URL}} > ${{LOGS_DIR}}/wrk-${{RUNTIMECMD.name}}-${{ITERATION}}.log 2>&1 &
        - sh: WRK_PID=$! && echo $WRK_PID
        - set-state: WRK_PID
        - script:
            name: monitor-process
            async: true
          with:
            name: pidstat
            command: pidstat -u -w -t -p ${{WRK_PID}} 1
            log_file: ${{LOGS_DIR}}/pidstat-wrk-${{RUNTIME_NAME}}-${{ITERATION}}.log
        - sh: wait ${{WRK_PID}}
        - sh: cat ${{LOGS_DIR}}/wrk-${{RUNTIMECMD.name}}-${{ITERATION}}.log | grep "Requests/sec" | awk '{print $2}'
          then:
            - set-state: THROUGHPUT
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.load.throughput
            value: ${{THROUGHPUT}}
        - sh: cat ${{LOGS_DIR}}/wrk-${{RUNTIMECMD.name}}-${{ITERATION}}.log | grep "Socket errors:" | sed -E 's/.*connectionErrors ([0-9]+).*/\1/'
          then:
            - regex: ^$
              then:
                - set-state: CONNECTION_ERRORS 0
              else:
                - set-state: CONNECTION_ERRORS
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.load.connectionErrors
            value: ${{CONNECTION_ERRORS}}

        - sh: cat ${{LOGS_DIR}}/wrk-${{RUNTIMECMD.name}}-${{ITERATION}}.log | grep "Socket errors:" | sed -E 's/.*requestTimeouts ([0-9]+)/\1/'
          then:
            - regex: ^$
              then:
                - set-state: REQUEST_TIMEOUTS 0
              else:
                - set-state: REQUEST_TIMEOUTS
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.load.requestTimeouts
            value: ${{REQUEST_TIMEOUTS}}

        - sh: pmap -x $PID | grep total | awk '{print $4}'
          then:
            - set-state: RSS
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.load.rss
            value: ${{= ${{RSS}}/1024 }}
        - script: state-array-push
          with:
            array: RUN.output.results.${{RUNTIMECMD.name}}.load.throughputDensity
            value: ${{= ${{THROUGHPUT}}/${{RSS}}*1024 }}
        - signal: LOAD_TEST_COMPLETE
        - sh: kill -15 $PID
        - sh: sleep ${{PAUSE_TIME}}
        - script: capture-otel-data
        - script: stop-test-services
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.load.avThroughput
        array: RUN.output.results.${{RUNTIMECMD.name}}.load.throughput
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.load.avMaxRss
        array: RUN.output.results.${{RUNTIMECMD.name}}.load.rss
    - script: state-array-calc-max
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.load.maxThroughputDensity
        array: RUN.output.results.${{RUNTIMECMD.name}}.load.throughputDensity
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.load.avConnectionErrors
        array: RUN.output.results.${{RUNTIMECMD.name}}.load.connectionErrors
    - script: state-array-calc-avg
      with:
        var-name: RUN.output.results.${{RUNTIMECMD.name}}.load.avRequestTimeouts
        array: RUN.output.results.${{RUNTIMECMD.name}}.load.requestTimeouts

  watch-log:
    - sh: tail -f ${{log_file}}
      watch:
        - regex: "${{log_regex}}"
          then:
            - ctrlC
            - signal: LOG_REGEX_REACHED
      timer:
        1m:
          - ctrlC
          - abort: Log file ${{log_file}} didn't match regex ${{log_regex}} after 10 minutes

  monitor-processes:
    - set-signal: LOAD_TEST_COMPLETE 1
    - script:
        name: monitor-process
        async: true
      with:
        name: pidstat
        command: pidstat -u -w -t -p ${{pid}} 1
        log_file: ${{log_dir}}/pidstat-${{runtime_name}}-${{iteration}}.log
    - script:
        name: monitor-process
        async: true
      with:
        name: mpstat
        command: mpstat -P ALL 1
        log_file: ${{log_dir}}/mpstat-${{runtime_name}}-${{iteration}}.log
    - script:
        name: monitor-process
        async: true
      with:
        name: vmstat
        command: vmstat 1
        log_file: ${{log_dir}}/vmstat-${{runtime_name}}-${{iteration}}.log
    - script: monitor-postgres
    - script: monitor-otel-lgtm

  monitor-otel-lgtm:
    - script:
        name: monitor-process
        async: true
      with:
        name: lgtm-pidstat
        command: pidstat -u -w -p ALL -G "grafana|loki|otelcol|prometheus|tempo|pyroscope" 1
        log_file: ${{log_dir}}/lgtm-pidstat-${{runtime_name}}-${{iteration}}.log

  monitor-postgres:
    - script:
        name: monitor-process
        async: true
      with:
        name: postgres-pidstat
        command: pidstat -u -w -p ALL -G "postgres" 1
        log_file: ${{log_dir}}/postgres-pidstat-${{runtime_name}}-${{iteration}}.log

  monitor-process:
    - queue-download: ${{log_file}}
    - sh: ${{MONITOR_CMD_PREFIX}} ${{command}} &>${{log_file}} &
    - sh: PROCESS_PID=$!
    - sh: echo $PROCESS_PID
    - set-state: PROCESS_PID
    - wait-for: ${{monitor_complete_signal:LOAD_TEST_COMPLETE}}
    - sh: kill -15 $PROCESS_PID

  download-metrics:
    - sh: mkdir -p ${{METRICS_DIR}}
    - sh: rm -Rf ${{METRICS_DIR}}/metrics.json
    - set-state: RUN.output.config ${{RUN.config}}
    - set-state: RUN.output.env ${{RUN.env}}
    - sh: echo '${{RUN.output}}' > ${{METRICS_DIR}}/metrics.json
      then:
      - regex: .*Permission denied
        then:
        - abort: Could not output metrics. Permission denied!
    - queue-download: ${{METRICS_DIR}}/metrics.json
#    - queue-download: ${{LOGS_DIR}}/*

hosts:
  target-host: ${{env.run.host.target}}

roles:
  test-runner:
    hosts:
      - target-host
    setup-scripts:
      - update-state
#      - output-vars
      - detect-os
      - cleanup-env
      - config-env
      - capture-system-info
      - ensure-requirements
      # clone-repo removed: rsync deploys files from local before this run
      - ensure-container-runtime
      - capture-repo-info
      - stop-test-services
      - start-timestamp
    run-scripts:
      - run-tests
    cleanup-scripts:
      - stop-timestamp
      - download-metrics
      - stop-test-services
      - cleanup-env
